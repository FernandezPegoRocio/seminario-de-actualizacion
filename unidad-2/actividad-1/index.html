<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora MVC</title>
</head>
<body>
</body>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 90vh;
        background-color: #f0f0f0;
    }
    table {
        border-collapse: collapse;
        background-color: #F5F5F5;
        padding: 20px;
        border-radius: 16px;
    }
    td { padding: 10px; }
    input[type="text"] {
        width: 100%;
        text-align: right;
        font-size: 1.5em;
        padding: 10px;
        background-color: white;
        border: none;
        border-radius: 10px;
        box-sizing: border-box;
    }
    button {
        width: 70px;
        height: 70px;
        font-size: 1.2em;
        font-family: Arial, sans-serif;
        font-weight: bold;
        color: white;
        border: none;
        border-radius: 12px;
        box-shadow: 0px 5px #1a1a1a;
        cursor: pointer;
    }
    .btn-numero   { background-color: #4a90d9; }
    .btn-operador { background-color: #ABD936; }
    .btn-igual    { background-color: #F0C800; }
    .btn-borrar {
        background-color: red;
        box-shadow: 0px 5px #BB3E22;
        width: 100%;
        height: 30px;
        border-radius: 6px;
    }
</style>
<script>

    // modelo
    class CalculadoraModel extends EventTarget
    {
        constructor()
        {
            super();
            this.operacion = '';
        }

        getOperacion()
        {
            return this.operacion;
        }

        agregarValor(valor)
        {
            this.operacion += valor;
            this.dispatchEvent(new CustomEvent('changed'));
        }

        calcular()
        {
            this.operacion = String(eval(this.operacion));
            this.dispatchEvent(new CustomEvent('changed'));
        }

        borrar()
        {
            this.operacion = '';
            this.dispatchEvent(new CustomEvent('changed'));
        }
    }

    //vista
    class CalculadoraView extends HTMLElement
    {
        constructor()
        {
            super();

            this.tabla    = document.createElement('table');
            this.display  = document.createElement('input');

            this.btn7     = document.createElement('button');
            this.btn8     = document.createElement('button');
            this.btn9     = document.createElement('button');
            this.btn4     = document.createElement('button');
            this.btn5     = document.createElement('button');
            this.btn6     = document.createElement('button');
            this.btn3     = document.createElement('button');
            this.btn2     = document.createElement('button');
            this.btn1     = document.createElement('button');
            this.btn0     = document.createElement('button');
            this.btnPunto = document.createElement('button');

            this.btnSuma  = document.createElement('button');
            this.btnResta = document.createElement('button');
            this.btnMult  = document.createElement('button');
            this.btnDiv   = document.createElement('button');

            this.btnIgual  = document.createElement('button');
            this.btnBorrar = document.createElement('button');

            this.display.type     = 'text';
            this.display.readOnly = true;

            this.btn7.innerText     = '7';
            this.btn8.innerText     = '8';
            this.btn9.innerText     = '9';
            this.btn4.innerText     = '4';
            this.btn5.innerText     = '5';
            this.btn6.innerText     = '6';
            this.btn3.innerText     = '3';
            this.btn2.innerText     = '2';
            this.btn1.innerText     = '1';
            this.btn0.innerText     = '0';
            this.btnPunto.innerText = '.';

            this.btnSuma.innerText  = '+';
            this.btnResta.innerText = '-';
            this.btnMult.innerText  = '*';
            this.btnDiv.innerText   = '/';

            this.btnIgual.innerText  = '=';
            this.btnBorrar.innerText = 'Borrar';

            this.btn7.className     = 'btn-numero';
            this.btn8.className     = 'btn-numero';
            this.btn9.className     = 'btn-numero';
            this.btn4.className     = 'btn-numero';
            this.btn5.className     = 'btn-numero';
            this.btn6.className     = 'btn-numero';
            this.btn3.className     = 'btn-numero';
            this.btn2.className     = 'btn-numero';
            this.btn1.className     = 'btn-numero';
            this.btn0.className     = 'btn-numero';
            this.btnPunto.className = 'btn-numero';
            this.btnSuma.className  = 'btn-operador';
            this.btnResta.className = 'btn-operador';
            this.btnMult.className  = 'btn-operador';
            this.btnDiv.className   = 'btn-operador';
            this.btnIgual.className  = 'btn-igual';
            this.btnBorrar.className = 'btn-borrar';

            let fDisplay = document.createElement('tr');
            let cDisplay = document.createElement('td');
            cDisplay.colSpan = 4;
            cDisplay.appendChild(this.display);
            fDisplay.appendChild(cDisplay);

            let f1 = document.createElement('tr');
            f1.appendChild(this._celda(this.btn7));
            f1.appendChild(this._celda(this.btn8));
            f1.appendChild(this._celda(this.btn9));
            f1.appendChild(this._celda(this.btnSuma));

            let f2 = document.createElement('tr');
            f2.appendChild(this._celda(this.btn4));
            f2.appendChild(this._celda(this.btn5));
            f2.appendChild(this._celda(this.btn6));
            f2.appendChild(this._celda(this.btnResta));

            let f3 = document.createElement('tr');
            f3.appendChild(this._celda(this.btn3));
            f3.appendChild(this._celda(this.btn2));
            f3.appendChild(this._celda(this.btn1));
            f3.appendChild(this._celda(this.btnMult));

            let f4 = document.createElement('tr');
            f4.appendChild(this._celda(this.btn0));
            f4.appendChild(this._celda(this.btnPunto));
            f4.appendChild(this._celda(this.btnIgual));
            f4.appendChild(this._celda(this.btnDiv));

            let fBorrar = document.createElement('tr');
            let cBorrar = document.createElement('td');
            cBorrar.colSpan = 4;
            cBorrar.appendChild(this.btnBorrar);
            fBorrar.appendChild(cBorrar);

            this.tabla.appendChild(fDisplay);
            this.tabla.appendChild(f1);
            this.tabla.appendChild(f2);
            this.tabla.appendChild(f3);
            this.tabla.appendChild(f4);
            this.tabla.appendChild(fBorrar);

            this.appendChild(this.tabla);
        }

        _celda(btn)
        {
            let td = document.createElement('td');
            td.appendChild(btn);
            return td;
        }

        // La vista despacha un único evento personalizado 
        _despacharRequest(detail)
        {
            this.dispatchEvent(new CustomEvent('request', { detail: detail }));
        }

        update(valor)
        {
            this.display.value = valor;
        }

        connectedCallback()
        {
            console.log('CalculadoraView agregada al DOM');

            // La vista vincula sus propios botones internamente y despacha afuera
            this.btn7.addEventListener('click',     this._despacharRequest.bind(this, '7'));
            this.btn8.addEventListener('click',     this._despacharRequest.bind(this, '8'));
            this.btn9.addEventListener('click',     this._despacharRequest.bind(this, '9'));
            this.btn4.addEventListener('click',     this._despacharRequest.bind(this, '4'));
            this.btn5.addEventListener('click',     this._despacharRequest.bind(this, '5'));
            this.btn6.addEventListener('click',     this._despacharRequest.bind(this, '6'));
            this.btn3.addEventListener('click',     this._despacharRequest.bind(this, '3'));
            this.btn2.addEventListener('click',     this._despacharRequest.bind(this, '2'));
            this.btn1.addEventListener('click',     this._despacharRequest.bind(this, '1'));
            this.btn0.addEventListener('click',     this._despacharRequest.bind(this, '0'));
            this.btnPunto.addEventListener('click', this._despacharRequest.bind(this, '.'));
            this.btnSuma.addEventListener('click',  this._despacharRequest.bind(this, '+'));
            this.btnResta.addEventListener('click', this._despacharRequest.bind(this, '-'));
            this.btnMult.addEventListener('click',  this._despacharRequest.bind(this, '*'));
            this.btnDiv.addEventListener('click',   this._despacharRequest.bind(this, '/'));
            this.btnIgual.addEventListener('click', this._despacharRequest.bind(this, '='));
            this.btnBorrar.addEventListener('click',this._despacharRequest.bind(this, 'borrar'));
        }

        disconnectedCallback()
        {
            console.log('CalculadoraView removida del DOM');

            this.btn7.removeEventListener('click',     this._despacharRequest.bind(this, '7'));
            this.btn8.removeEventListener('click',     this._despacharRequest.bind(this, '8'));
            this.btn9.removeEventListener('click',     this._despacharRequest.bind(this, '9'));
            this.btn4.removeEventListener('click',     this._despacharRequest.bind(this, '4'));
            this.btn5.removeEventListener('click',     this._despacharRequest.bind(this, '5'));
            this.btn6.removeEventListener('click',     this._despacharRequest.bind(this, '6'));
            this.btn3.removeEventListener('click',     this._despacharRequest.bind(this, '3'));
            this.btn2.removeEventListener('click',     this._despacharRequest.bind(this, '2'));
            this.btn1.removeEventListener('click',     this._despacharRequest.bind(this, '1'));
            this.btn0.removeEventListener('click',     this._despacharRequest.bind(this, '0'));
            this.btnPunto.removeEventListener('click', this._despacharRequest.bind(this, '.'));
            this.btnSuma.removeEventListener('click',  this._despacharRequest.bind(this, '+'));
            this.btnResta.removeEventListener('click', this._despacharRequest.bind(this, '-'));
            this.btnMult.removeEventListener('click',  this._despacharRequest.bind(this, '*'));
            this.btnDiv.removeEventListener('click',   this._despacharRequest.bind(this, '/'));
            this.btnIgual.removeEventListener('click', this._despacharRequest.bind(this, '='));
            this.btnBorrar.removeEventListener('click',this._despacharRequest.bind(this, 'borrar'));
        }
    }

    // controlador
    class CalculadoraController
    {
        constructor(modelObject, viewObject)
        {
            this.model = modelObject;
            this.view  = viewObject;
        }

        init()
        {
            // Suscripción al evento del modelo
            this.model.addEventListener('changed', this.onModelChanged.bind(this));

            // El controlador solo escucha el unico evento de la vista
            this.view.addEventListener('request', this.onViewRequest.bind(this));

            // Estado inicial de la vista
            this.view.update(this.model.getOperacion());
        }

        release()
        {
            this.model.removeEventListener('changed', this.onModelChanged.bind(this));
            this.view.removeEventListener('request',  this.onViewRequest.bind(this));
        }

        // El controlador discrimina la acción con event.detail
        onViewRequest(event)
        {
            if (event.detail === '=')
            {
                this.model.calcular();
            }
            else if (event.detail === 'borrar')
            {
                this.model.borrar();
            }
            else
            {
                this.model.agregarValor(event.detail);
            }
        }

        onModelChanged()
        {
            this.view.update(this.model.getOperacion());
        }
    }

    customElements.define('x-calculadora', CalculadoraView);

    function main()
    {
        let miModel      = new CalculadoraModel();
        let miView       = new CalculadoraView();
        let miController = new CalculadoraController(miModel, miView);

        miController.init();

        document.body.appendChild(miView);
    }

    window.onload = main;

</script>
</html>
