<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fecha de Nacimiento</title>

</head>

<body>

</body>

<style>

body {

display: flex;

justify-content: center;

align-items: center;

height: 90vh;

background-color: #f0f0f0;

}

.contenedor {

display: flex;

flex-direction: column;

gap: 10px;

background-color: #F5F5F5;

padding: 30px;

border-radius: 16px;

font-family: Arial, sans-serif;

}

input {

padding: 8px;

font-size: 1em;

border-radius: 8px;

border: 1px solid #ccc;

}

button {

width: 100%;

height: 50px;

font-size: 1.2em;

font-family: Arial, sans-serif;

font-weight: bold;

color: white;

background-color: #4a90d9;

border: none;

border-radius: 12px;

box-shadow: 0px 5px #1a1a1a;

cursor: pointer;

}

#resultado {

font-size: 1.3em;

font-weight: bold;

color: green;

margin-top: 10px;

}

#errores {

font-size: 1em;

font-weight: bold;

color: red;

margin-top: 5px;

}

</style>

<script>

class ValidadorFecha extends HTMLElement

{

constructor()

{

super();

this.reintentos = 0;

this.contenedor = document.createElement('div');

this.contenedor.className = 'contenedor';

this.mainTitle          = document.createElement('h1');

this.mainTitle.innerText = 'Fecha de nacimiento';

this.labelFecha          = document.createElement('label');

this.labelFecha.htmlFor  = 'inputFecha';

this.labelFecha.innerText = 'Ingresá tu fecha de nacimiento (DD/MM/AAAA):';

this.inputFecha             = document.createElement('input');

this.inputFecha.type        = 'text';

this.inputFecha.id          = 'inputFecha';

this.inputFecha.placeholder = 'DD/MM/AAAA';

this.btnConfirmar          = document.createElement('button');

this.btnConfirmar.innerText = 'Confirmar';

this.resultado    = document.createElement('p');

this.resultado.id = 'resultado';

this.errores    = document.createElement('p');

this.errores.id = 'errores';

this.contenedor.appendChild(this.mainTitle);

this.contenedor.appendChild(this.labelFecha);

this.contenedor.appendChild(this.inputFecha);

this.contenedor.appendChild(this.btnConfirmar);

this.contenedor.appendChild(this.resultado);

this.contenedor.appendChild(this.errores);

this.appendChild(this.contenedor);

}

validarFecha()

{

let input  = this.inputFecha.value;

let partes = input.split('/');

let esValida = false;

if (partes.length === 3) {

let dia  = parseInt(partes[0]);

let mes  = parseInt(partes[1]);

let anio = parseInt(partes[2]);

let fecha = new Date(anio, mes - 1, dia);

esValida =

fecha.getFullYear() === anio &&

fecha.getMonth()    === mes - 1 &&

fecha.getDate()     === dia &&

anio > 1900 &&

anio <= new Date().getFullYear();

}

if (esValida) {

this.resultado.textContent = '✔ Fecha válida: ' + input;

this.errores.textContent   = '';

this.reintentos = 0;

} else {

this.reintentos++;

this.errores.textContent   = '✘ Fecha inválida. Reintento N° ' + this.reintentos + '. Ingresá el formato DD/MM/AAAA.';

this.resultado.textContent = '';

this.inputFecha.value      = '';

}

}

connectedCallback()

{

console.log('ValidadorFecha agregado al DOM');

this.btnConfirmar.onclick = this.validarFecha.bind(this);

}

disconnectedCallback()

{

console.log('ValidadorFecha removido del DOM');

this.btnConfirmar.onclick = null;

}

}

customElements.define('x-validador-fecha', ValidadorFecha);

function main()

{

let miValidador = new ValidadorFecha();

document.body.appendChild(miValidador);

}

window.onload = main;

</script>

</html>
